name: Build Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Decode release keystore
        run: |
          mkdir -p keystores
          echo "${{ secrets.ASAHI_RELEASE_KEYSTORE_B64 }}" | base64 -d > keystores/asahi-release.keystore

      - name: Build signed release APK
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ASAHI_VERSION_CODE: ${{ github.run_number }}
          ASAHI_RELEASE_STORE_FILE: keystores/asahi-release.keystore
          ASAHI_RELEASE_STORE_PASSWORD: ${{ secrets.ASAHI_RELEASE_STORE_PASSWORD }}
          ASAHI_RELEASE_KEY_ALIAS: ${{ secrets.ASAHI_RELEASE_KEY_ALIAS }}
          ASAHI_RELEASE_KEY_PASSWORD: ${{ secrets.ASAHI_RELEASE_KEY_PASSWORD }}
        run: ./gradlew --stacktrace assembleRelease

      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/release/app-release.apk asahi-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: asahi-release-apk
          path: asahi-release.apk
          if-no-files-found: error

      - name: Publish rolling release build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-release
          name: Latest Release Build
          body: |
            Rolling signed release APK build from `${{ github.sha }}`.

            Version code: `${{ github.run_number }}`

            Install/update using the attached `asahi-release.apk`.
          files: asahi-release.apk
          prerelease: true
          make_latest: false
