name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ASAHI_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew --stacktrace assembleDebug

      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk asahi-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: asahi-debug-apk
          path: asahi-debug.apk
          if-no-files-found: error

      - name: Publish rolling debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest Debug Build
          body: |
            Rolling debug APK build from `${{ github.sha }}`.

            Version code: `${{ github.run_number }}`

            Install/update using the attached `asahi-debug.apk`.
          files: asahi-debug.apk
          prerelease: true
          make_latest: false
